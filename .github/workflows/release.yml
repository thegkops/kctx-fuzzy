name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate bash script syntax
        run: bash -n kctx-fuzzy.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: python3 -c "import ast; ast.parse(open('kctx_fuzzy/main.py').read()); print('Python syntax OK')"

      - name: Install build tools
        run: pip install build

      - name: Build Python distribution
        run: python -m build

      - name: Extract tag version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.version }}"
          tag_name: "${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            kctx-fuzzy.sh
            install.sh
            dist/*.whl
            dist/*.tar.gz
          body: |
            ## kctx-fuzzy ${{ steps.version.outputs.version }}

            kubectl context and namespace switcher with built-in fuzzy search.

            ### Install (bash script — no dependencies)
            ```bash
            curl -sSfL https://raw.githubusercontent.com/thegkops/kctx-fuzzy/main/install.sh | bash
            ```

            ### Install (Python CLI)
            ```bash
            pip install kctx-fuzzy
            ```

            ### Usage
            ```
            kctx-fuzzy            # switch context (fuzzy)
            kctx-fuzzy -n         # switch namespace (fuzzy)
            kctx-fuzzy -c         # show current context
            kctx-fuzzy -l         # list all contexts
            kns-fuzzy             # switch namespace (alias)
            ```
