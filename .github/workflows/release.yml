name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Validate bash syntax
        run: bash -n kctx-fuzzy.sh && echo "bash OK"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5

      - name: Validate Python syntax
        run: python3 -c "import ast; ast.parse(open('kctx_fuzzy/main.py').read()); print('Python OK')"

      - name: Build Python wheel
        run: |
          pip install --quiet build setuptools wheel
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          generate_release_notes: true
          files: |
            kctx-fuzzy.sh
            install.sh
            dist/*.whl
            dist/*.tar.gz
          body: |
            ## kctx-fuzzy ${{ github.ref_name }}

            kubectl context and namespace switcher with built-in fuzzy search.

            ### Install (bash — zero dependencies)
            ```bash
            curl -sSfL https://raw.githubusercontent.com/thegkops/kctx-fuzzy/main/install.sh | bash
            ```

            ### Install (Python CLI)
            ```bash
            pip install kctx-fuzzy
            ```

            ### Usage
            ```
            kctx-fuzzy       # switch context with fuzzy search
            kctx-fuzzy -n    # switch namespace with fuzzy search
            kctx-fuzzy -c    # show current context + namespace
            kctx-fuzzy -l    # list all contexts with server URLs
            kns-fuzzy        # namespace switch alias
            ```
